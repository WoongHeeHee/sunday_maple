name: Sunday Maple Alarm

on:
  schedule:
    # 금요일 10:05 / 10:15 / 10:25 KST (= UTC 01:05 / 01:15 / 01:25)
    - cron: '5 1 * * 5'
    - cron: '15 1 * * 5'
    - cron: '25 1 * * 5'
  workflow_dispatch:
    inputs:
      force_run:
        description: "이번 주 중복 방지 무시 (테스트용)"
        required: false
        default: false
        type: boolean

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Restore notification state
        uses: actions/cache@v4
        id: cache-state
        with:
          path: data/state.json
          key: sunday-maple-state-v1

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Sunday Maple bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          JINA_API_KEY: ${{ secrets.JINA_API_KEY }}
          FORCE_NOTIFY: ${{ github.event.inputs.force_run || 'false' }}
        run: python main.py

      - name: Save notification state
        if: success() && hashFiles('data/state.json') != ''
        uses: actions/cache/save@v4
        with:
          path: data/state.json
          key: sunday-maple-state-v1
