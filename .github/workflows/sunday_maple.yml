name: Sunday Maple Alarm

on:
  schedule:
    # 금요일 10:05 / 10:15 / 10:25 KST (= UTC 01:05 / 01:15 / 01:25)
    - cron: '5 1 * * 5'
    - cron: '15 1 * * 5'
    - cron: '25 1 * * 5'
  workflow_dispatch:

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Restore notification state
        uses: actions/cache@v4
        id: cache-state
        with:
          path: data/state.json
          key: sunday-maple-state-v1

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Tesseract OCR (Korean)
        run: sudo apt-get update && sudo apt-get install -y tesseract-ocr tesseract-ocr-kor

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run Sunday Maple bot
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          OCR_SPACE_API_KEY: ${{ secrets.OCR_SPACE_API_KEY }}
        run: python main.py

      - name: Save notification state
        if: success() && hashFiles('data/state.json') != ''
        uses: actions/cache/save@v4
        with:
          path: data/state.json
          key: sunday-maple-state-v1
